# ============================================
# Weekly Product Review Pulse — Configuration
# ============================================
# See docs/architecture.md §7 for full documentation.

# --- Product ---
product:
  name: "Groww"
  play_store_app_id: "com.nextbillion.groww"
  review_window_weeks: 12            # Rolling window (8–12 configurable)

# --- MCP Servers ---
mcp_servers:
  playstore_reviews:
    transport: "stdio"
    command: "python"
    args: ["-m", "src.mcp_servers.playstore_reviews.server"]

  google_docs:
    transport: "sse"
    url: "https://mcp-server-ghratika-production.up.railway.app/sse"
    api_key: "${MCP_API_SECRET_KEY}"

  gmail:
    transport: "sse"
    url: "https://mcp-server-ghratika-production.up.railway.app/sse"
    api_key: "${MCP_API_SECRET_KEY}"

# --- Delivery ---
delivery:
  google_doc_id: "${GOOGLE_DOC_ID}"   # Shared pulse doc ID
  recipients:
    - "kanikagupta40029@gmail.com"
  email_mode: "draft"                 # "draft" for staging, "sent" for production
  email_subject_template: "Groww Review Pulse — {iso_week}"

# --- LLM ---
llm:
  provider: "groq"                    # Using Groq free tier
  model: "llama-3.3-70b-versatile"   # Groq-hosted Llama 3.3 70B
  # Groq free-tier rate limits
  requests_per_minute: 30
  requests_per_day: 1000
  tokens_per_minute: 12000
  tokens_per_day: 100000

# --- Clustering ---
clustering:
  embedding_model: "BAAI/bge-small-en-v1.5"   # sentence-transformers model
  umap_n_neighbors: 15
  umap_n_components: 5
  hdbscan_min_cluster_size: 5
  max_themes: 8
