# ============================================
# Weekly Product Review Pulse — Configuration Template
# ============================================
# Copy this file to config.yaml and fill in your values.
# See docs/architecture.md §7 for full documentation.

# --- Product ---
product:
  name: "YourApp"                           # Display name for reports
  play_store_app_id: "com.nextbillion.groww"      # Google Play package name
  review_window_weeks: 12                   # Rolling window: 8–12 weeks

# --- MCP Servers ---
mcp_servers:
  playstore_reviews:
    transport: "stdio"
    command: "python"
    args: ["-m", "src.mcp_servers.playstore_reviews.server"]

  google_docs:
    transport: "stdio"                      # "stdio" (local) or "sse" (remote)
    command: "npx"
    args: ["-y", "@anthropic/google-docs-mcp"]
    env:
      GOOGLE_CREDENTIALS_PATH: "${GOOGLE_CREDENTIALS_PATH}"

  gmail:
    transport: "stdio"
    command: "npx"
    args: ["-y", "@anthropic/gmail-mcp"]
    env:
      GOOGLE_CREDENTIALS_PATH: "${GOOGLE_CREDENTIALS_PATH}"

# --- Delivery ---
delivery:
  google_doc_id: "${GOOGLE_DOC_ID}"  # Shared pulse document ID
  recipients:
    - "team@example.com"                    # Stakeholder email addresses
  email_mode: "draft"                       # "draft" (staging) or "sent" (production)
  email_subject_template: "{product_name} Review Pulse — {iso_week}"

# --- LLM ---
llm:
  provider: "groq"                              # LLM provider (Groq free tier)
  model: "llama-3.3-70b-versatile"             # Groq-hosted Llama 3.3 70B model
  # Groq free-tier rate limits — do not exceed these
  requests_per_minute: 30                       # Max API calls per minute
  requests_per_day: 1000                        # Max API calls per day
  tokens_per_minute: 12000                      # Max tokens processed per minute
  tokens_per_day: 100000                        # Max tokens processed per day

# --- Clustering ---
clustering:
  embedding_model: "BAAI/bge-small-en-v1.5"      # sentence-transformers model name
  umap_n_neighbors: 15                      # UMAP: number of neighbors
  umap_n_components: 5                      # UMAP: output dimensions
  hdbscan_min_cluster_size: 5               # HDBSCAN: minimum cluster size
  max_themes: 8                             # Maximum themes to report
